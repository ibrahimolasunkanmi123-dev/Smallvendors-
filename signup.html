<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Small Vendors</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full space-y-8 p-8">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Create your account
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Or
                <a href="login.html" class="font-medium text-blue-600 hover:text-blue-500">
                    sign in to existing account
                </a>
            </p>
        </div>
        
        <div id="message" class="hidden p-4 rounded-md"></div>
        
        <form class="mt-8 space-y-6" id="signupForm">
            <div class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
                    <input id="name" name="name" type="text" required 
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                           placeholder="Enter your full name">
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input id="email" name="email" type="email" required 
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                           placeholder="Enter your email">
                </div>
                
                <div>
                    <label for="userType" class="block text-sm font-medium text-gray-700">Account Type</label>
                    <select id="userType" name="userType" required 
                            class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        <option value="">Select account type</option>
                        <option value="buyer">Customer</option>
                        <option value="vendor">Small Business Vendor</option>
                    </select>
                </div>

                <div>
                    <label for="businessName" class="block text-sm font-medium text-gray-700">Business Name (Vendors)</label>
                    <input id="businessName" name="businessName" type="text"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                           placeholder="Enter business name if vendor">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input id="password" name="password" type="password" required 
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                           placeholder="Create a password">
                </div>

                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700">Phone (Optional)</label>
                    <input id="phone" name="phone" type="text"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                           placeholder="Enter your phone number">
                </div>

                <div>
                    <label for="address" class="block text-sm font-medium text-gray-700">Address (Optional)</label>
                    <input id="address" name="address" type="text"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                           placeholder="Enter your address">
                </div>
                
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required 
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" 
                           placeholder="Confirm your password">
                </div>
            </div>

            <div class="flex items-center">
                <input id="terms" name="terms" type="checkbox" required
                       class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="terms" class="ml-2 block text-sm text-gray-900">
                    I agree to the <a href="#" class="text-blue-600 hover:text-blue-500">Terms and Conditions</a>
                </label>
            </div>

            <div>
                <button type="submit" 
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                    Create Account
                </button>
            </div>
        </form>
        
        <div class="text-center">
            <a href="index.html" class="text-blue-600 hover:text-blue-500">← Back to home</a>
        </div>
    </div>

    <script>
        // Initialize Appwrite
        const { Client, Account, Databases, ID } = Appwrite;
        const client = new Client()
            .setEndpoint('https://nyc.cloud.appwrite.io/v1')
            .setProject('699b21ef002b28b002d7');
        const account = new Account(client);
        const databases = new Databases(client);
        const DATABASE_IDS = ['smallvendors-db', 'smallvendors'];
        const USERS_COLLECTION_ID = 'users';
        const VENDORS_COLLECTION_ID = 'vendors';
        const BUILD_VERSION = '2026-03-07-signup-fix-2';
        console.log('SmallVendors signup build:', BUILD_VERSION);

        async function createSession(email, password) {
            if (typeof account.createEmailPasswordSession === 'function') {
                return account.createEmailPasswordSession(email, password);
            }
            if (typeof account.createEmailSession === 'function') {
                return account.createEmailSession(email, password);
            }
            throw new Error('Appwrite session method not available in loaded SDK version.');
        }

        async function createDocumentWithDatabaseFallback(collectionId, documentId, data, permissions) {
            let lastError = null;
            for (const dbId of DATABASE_IDS) {
                try {
                    return await databases.createDocument(dbId, collectionId, documentId, data, permissions);
                } catch (err) {
                    lastError = err;
                }
            }
            throw lastError || new Error(`Failed to create ${collectionId} document.`);
        }

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const userType = document.getElementById('userType').value;
            const businessName = document.getElementById('businessName').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const terms = document.getElementById('terms').checked;
            const messageDiv = document.getElementById('message');
            
            // Validation
            if (!name || !email || !userType || !password || !confirmPassword) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 8) {
                showMessage('Password must be at least 8 characters long', 'error');
                return;
            }
            
            if (!terms) {
                showMessage('Please accept the terms and conditions', 'error');
                return;
            }

            if (userType === 'vendor' && !businessName) {
                showMessage('Business name is required for vendor accounts', 'error');
                return;
            }
            
            showMessage('Creating account...', 'info');
            
            try {
                const normalizedUserType = userType === 'vendor' ? 'vendor' : 'buyer';
                const user = await account.create(ID.unique(), email, password, name);
                await createSession(email, password);
                const userDoc = await createDocumentWithDatabaseFallback(
                    USERS_COLLECTION_ID,
                    user.$id,
                    {
                        name,
                        email,
                        userType: normalizedUserType,
                        phone: phone || null,
                        address: address || null,
                        createdAt: new Date().toISOString(),
                        lastLogin: new Date().toISOString()
                    },
                    [
                        `read("user:${user.$id}")`,
                        `update("user:${user.$id}")`,
                        `delete("user:${user.$id}")`
                    ]
                );

                if (!userDoc || !userDoc.$id) {
                    throw new Error('Failed to save profile in users table.');
                }

                if (normalizedUserType === 'vendor') {
                    const vendorDoc = await createDocumentWithDatabaseFallback(
                        VENDORS_COLLECTION_ID,
                        ID.unique(),
                        {
                            vendorId: user.$id,
                            businessName: businessName || name,
                            Email: email,
                            isVerified: false,
                            rating: 0,
                            totalSales: 0,
                            userId: user.$id,
                            businessDescription: null,
                            createdAt: new Date().toISOString()
                        },
                        [
                            `read("user:${user.$id}")`,
                            `update("user:${user.$id}")`,
                            `delete("user:${user.$id}")`
                        ]
                    );

                    if (!vendorDoc || !vendorDoc.$id) {
                        throw new Error('Failed to save vendor details in vendors table.');
                    }
                }

                window.location.replace('index.html');
            } catch (error) {
                console.error('Signup flow error:', error);
                showMessage(error.message || 'Registration failed', 'error');
            }
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `p-4 rounded-md ${type === 'error' ? 'bg-red-100 text-red-700' : 
                                                   type === 'success' ? 'bg-green-100 text-green-700' : 
                                                   'bg-blue-100 text-blue-700'}`;
            messageDiv.textContent = text;
            messageDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
